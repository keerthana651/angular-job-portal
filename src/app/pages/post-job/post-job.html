<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      <h3>Post New Job</h3>
    </div>

    <div class="card-body">

      <form #f="ngForm" (ngSubmit)="submit()">

        <input
          class="form-control mb-3"
          name="title"
          [(ngModel)]="job.title"
          placeholder="Job Title"
          required>

        <input
          class="form-control mb-3"
          name="company"
          [(ngModel)]="job.company"
          placeholder="Company"
          required>

        <input
          class="form-control mb-3"
          name="location"
          [(ngModel)]="job.location"
          placeholder="Location"
          required>

        <input
          class="form-control mb-3"
          name="salary"
          [(ngModel)]="job.salary"
          placeholder="Salary"
          required>

        <input
          class="form-control mb-3"
          name="experience"
          [(ngModel)]="job.experience"
          placeholder="Experience"
          required>

        <textarea
          class="form-control mb-3"
          rows="4"
          name="description"
          [(ngModel)]="job.description"
          placeholder="Description"
          required>
        </textarea>

        <button
          class="btn btn-success"
          [disabled]="f.invalid">
          Post Job
        </button>

      </form>

    </div>

  </div>

</div>
