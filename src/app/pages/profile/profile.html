<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="card profile-card shadow-lg">

        <div class="card-body text-center p-5">

          <div class="profile-avatar">

            <i class="bi bi-person-fill"></i>

          </div>

          <h2 class="mt-4 fw-bold">
            {{ user.name }}
          </h2>

          <p class="text-muted">
            {{ user.email }}
          </p>

          <hr>

          <div class="row mt-4">

            <div class="col-md-6 mb-3">

              <div class="info-box">

                <h6>Role</h6>

                <p>{{ user.role }}</p>

              </div>

            </div>

            <div class="col-md-6 mb-3">

              <div class="info-box">

                <h6>Location</h6>

                <p>{{ user.location }}</p>

              </div>

            </div>

          </div>

          <div class="row mt-4">

            <div class="col-md-4">

              <div class="stats-box">

                <h3>12</h3>

                <p>Applications</p>

              </div>

            </div>

            <div class="col-md-4">

              <div class="stats-box">

                <h3>8</h3>

                <p>Saved Jobs</p>

              </div>

            </div>

            <div class="col-md-4">

              <div class="stats-box">

                <h3>95%</h3>

                <p>Profile</p>

              </div>

            </div>

          </div>

          <div class="mt-5">

            <button class="btn btn-warning me-3">

              <i class="bi bi-pencil-square"></i>

              Edit Profile

            </button>

            <button class="btn btn-danger">

              <i class="bi bi-box-arrow-right"></i>

              Logout

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
