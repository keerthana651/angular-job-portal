<div class="container mt-5">

    <h2 class="dashboard-title text-center mb-5">
    🚀 Admin Dashboard
</h2>

    <!-- Statistics -->
    <div class="row mb-4">

        <div class="col-md-4 mb-3">

            <div class="card stat-card bg-primary text-white">

                <div class="card-body text-center">

                    <i class="bi bi-briefcase-fill display-4"></i>

                    <h2 class="mt-2">{{ totalJobs }}</h2>

                    <h5>Total Jobs</h5>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-success text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-file-earmark-check-fill display-4"></i>

                    <h2 class="mt-2">{{ totalApplications }}</h2>

                    <h5>Applications</h5>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-warning shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people-fill display-4"></i>

                    <h2 class="mt-2">{{ totalUsers }}</h2>

                    <h5>Users</h5>

                </div>

            </div>

        </div>

    </div>

    <!-- Quick Actions -->

    <div class="card quick-card shadow-lg">

        <div class="card-header bg-dark text-white">

            <h4 class="mb-0">
                Quick Actions
            </h4>

        </div>

        <div class="card-body">

            <div class="row text-center">

                <div class="col-md-3 mb-3">

                    <a
                        routerLink="/post-job"
                        class="btn btn-primary w-100">

                        <i class="bi bi-plus-circle"></i>

                        Post Job

                    </a>

                </div>

                <div class="col-md-3 mb-3">

                    <a
                        routerLink="/jobs"
                        class="btn btn-success w-100">

                        <i class="bi bi-list-task"></i>

                        Manage Jobs

                    </a>

                </div>

                <div class="col-md-3 mb-3">

                    <a
                        routerLink="/applications"
                        class="btn btn-warning w-100">

                        <i class="bi bi-file-earmark-text"></i>

                        Applications

                    </a>

                </div>

                <div class="col-md-3 mb-3">

                    <a
                        routerLink="/profile"
                        class="btn btn-info text-white w-100">

                        <i class="bi bi-person-circle"></i>

                        Profile

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
